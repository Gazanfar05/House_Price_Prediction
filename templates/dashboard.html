<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Prediction Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background: #000000;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: #fff;
            margin-bottom: 40px;
        }

        header h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.1em;
            opacity: 0.9;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
            font-family: 'Times New Roman', Times, serif;
        }

        .stat-box:hover {
            transform: translateY(-5px);
        }

        .stat-box .value {
            font-family: 'Times New Roman', Times, serif;
            font-size: 2.5em;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-box .label {
            font-family: 'Times New Roman', Times, serif;
            font-size: 0.9em;
            opacity: 0.9;
        }

        .card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
            margin-bottom: 30px;
            transition: transform 0.3s;
            border: 1px solid #333;
            font-family: 'Times New Roman', Times, serif;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
            border-color: #FFD700;
        }

        .card h3 {
            color: #FFD700;
            margin-bottom: 20px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.5em;
            border-bottom: 3px solid #FFD700;
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            margin: 10px 0;
            background: #2a2a2a;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
            font-family: 'Times New Roman', Times, serif;
            color: #fff;
        }

        .metric:hover {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: translateX(5px);
        }

        .metric-label {
            font-family: 'Times New Roman', Times, serif;
            font-weight: 600;
        }

        .metric-value {
            font-family: 'Times New Roman', Times, serif;
            font-weight: bold;
            color: #667eea;
            font-size: 1.2em;
        }

        .metric:hover .metric-value {
            color: white;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .image-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (min-width: 1400px) {
            .image-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 2000px) {
            .image-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .image-container {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            border: 1px solid #333;
        }

        .image-container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
            border-color: #FFD700;
        }

        .image-container h3 {
            color: #FFD700;
            margin-bottom: 20px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            flex-grow: 1;
            object-fit: cover;
        }

        .image-container-full {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
            margin-bottom: 40px;
            transition: all 0.3s;
            border: 1px solid #333;
        }

        .image-container-full:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.2);
            border-color: #FFD700;
        }

        .image-container-full h3 {
            color: #FFD700;
            margin-bottom: 25px;
            font-family: 'Times New Roman', Times, serif;
            font-size: 1.5em;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 3px solid #FFD700;
            padding-bottom: 15px;
        }

        .image-container-full img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-family: 'Times New Roman', Times, serif;
        }

        table thead {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-family: 'Times New Roman', Times, serif;
        }

        table td {
            padding: 12px 15px;
            border-bottom: 1px solid #333;
            color: #fff;
            font-family: 'Times New Roman', Times, serif;
        }

        table tr:hover {
            background: #2a2a2a;
        }

        .loading {
            text-align: center;
            color: white;
            padding: 60px 20px;
            font-family: 'Times New Roman', Times, serif;
        }

        .loading i {
            font-size: 3em;
            margin-bottom: 20px;
        }

        .error {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            font-family: 'Times New Roman', Times, serif;
        }

        footer {
            text-align: center;
            color: #999;
            margin-top: 60px;
            padding: 20px;
            opacity: 0.8;
            font-family: 'Times New Roman', Times, serif;
        }

        .positive {
            color: #28a745;
            font-weight: bold;
            font-family: 'Times New Roman', Times, serif;
        }

        .negative {
            color: #dc3545;
            font-weight: bold;
            font-family: 'Times New Roman', Times, serif;
        }

        .section-title {
            color: #FFD700;
            font-family: 'Times New Roman', Times, serif;
            font-size: 2.5em;
            margin: 60px 0 30px 0;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: bold;
        }

        .section-divider {
            width: 100%;
            height: 2px;
            background: #FFD700;
            margin: 20px 0;
        }

        .image-container img {
            transition: transform 0.3s ease;
        }

        .image-container:hover img {
            transform: scale(1.02);
        }

        .image-container-full img {
            transition: transform 0.3s ease;
        }

        .image-container-full:hover img {
            transform: scale(1.02);
        }

        /* Price Predictor Styles */
        .prediction-card {
            background: #1a1a1a;
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            border: 2px solid #FFD700;
            transition: all 0.3s;
        }

        .prediction-card:hover {
            box-shadow: 0 15px 50px rgba(255, 215, 0, 0.2);
            border-color: #FFC700;
        }

        .prediction-card h2 {
            color: #FFD700;
            font-family: 'Times New Roman', Times, serif;
            margin-bottom: 20px;
            font-size: 1.8em;
            border-bottom: 3px solid #FFD700;
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 8px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
            font-size: 0.9em;
            font-family: 'Times New Roman', Times, serif;
            color: #FFD700;
        }

        .form-group input {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #333;
            border-radius: 6px;
            background: #2a2a2a;
            color: #fff;
            font-size: 0.85em;
            font-family: 'Times New Roman', Times, serif;
            transition: all 0.3s;
        }

        .form-group input::placeholder {
            color: #666;
        }

        .form-group input:focus {
            outline: none;
            border-color: #FFD700;
            background: #333;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.2);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: 'Times New Roman', Times, serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #FFD700, #FFC700);
            color: #000;
            width: 100%;
            justify-content: center;
            margin-bottom: 15px;
            border: 2px solid #FFD700;
            font-weight: bold;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #FFC700, #FFB700);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 215, 0, 0.3);
            border-color: #FFB700;
        }

        .btn-primary:active {
            transform: translateY(0px);
        }

        .prediction-result {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(118, 75, 162, 0.1));
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 15px;
            border: 2px solid #FFD700;
            font-family: 'Times New Roman', Times, serif;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.1);
            transition: all 0.3s;
        }

        .prediction-result:hover {
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
            border-color: #FFC700;
        }

        .prediction-result.hidden {
            display: none;
        }

        .prediction-result p {
            color: #FFD700;
            opacity: 1;
            font-size: 1em;
            font-family: 'Times New Roman', Times, serif;
            font-weight: 600;
        }

        .prediction-result .price {
            font-size: 2.5em;
            font-weight: bold;
            color: #FFD700;
            margin: 15px 0;
            font-family: 'Times New Roman', Times, serif;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2em;
            }

            .grid-2col {
                grid-template-columns: 1fr;
            }

            .image-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .section-title {
                font-size: 1.8em;
            }

            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .prediction-result .price {
                font-size: 2em;
            }
        }

        @media (max-width: 480px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>House Price Prediction</h1>
            <p>Advanced Machine Learning Dashboard</p>
        </header>

        <div id="content">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p style="font-size: 1.2em; margin-top: 20px;">Loading dashboard...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>Copyright 2024 House Price Prediction ML Dashboard</p>
    </footer>

    <script>
        // Store model R² for display
        window.modelR2 = 0.85;

        async function loadDashboard() {
            try {
                console.log('Starting dashboard load...');
                
                const modelRes = await fetch('/api/model-info');
                if (!modelRes.ok) throw new Error('Model info error: ' + modelRes.status);
                const modelInfo = await modelRes.json();
                
                // Store R² score for predictions
                window.modelR2 = (modelInfo.metrics?.test_r2 || 0.85);
                
                console.log('Model info loaded');

                const imagesRes = await fetch('/api/images');
                if (!imagesRes.ok) throw new Error('Images error: ' + imagesRes.status);
                const images = await imagesRes.json();
                console.log('Images loaded:', Object.keys(images));

                const html = generateDashboardHTML(modelInfo, images);
                document.getElementById('content').innerHTML = html;
                attachEventListeners(modelInfo.features);
                console.log('Dashboard rendered successfully');

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <h2>Error Loading Dashboard</h2>
                        <p style="margin-top: 10px;">${error.message}</p>
                        <p style="margin-top: 20px;"><strong>Solution:</strong></p>
                        <p>1. Run: python main.py</p>
                        <p>2. Run: python web_dashboard.py</p>
                        <p>3. Refresh this page</p>
                    </div>
                `;
            }
        }

        function generateDashboardHTML(data, images) {
            const metrics = data.metrics || {};
            const coefficients = data.coefficients || {};
            const features = data.features || [];

            const coeffArray = Object.entries(coefficients)
                .map(([feature, coef]) => ({ feature, coefficient: coef }))
                .sort((a, b) => Math.abs(b.coefficient) - Math.abs(a.coefficient));

            let html = `
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="label">Test R Score</div>
                        <div class="value">${(metrics.test_r2 * 100).toFixed(2)}%</div>
                    </div>
                    <div class="stat-box">
                        <div class="label">Test RMSE</div>
                        <div class="value">$${(metrics.test_rmse || 0).toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
                    </div>
                    <div class="stat-box">
                        <div class="label">Test MAE</div>
                        <div class="value">$${(metrics.test_mae || 0).toLocaleString('en-US', {maximumFractionDigits: 0})}</div>
                    </div>
                    <div class="stat-box">
                        <div class="label">Features Used</div>
                        <div class="value">${features.length}</div>
                    </div>
                </div>

                <div class="card">
                    <h3>Performance Metrics</h3>
                    <div class="metric">
                        <span class="metric-label">Train R Score</span>
                        <span class="metric-value">${(metrics.train_r2 * 100).toFixed(2)}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Test R Score</span>
                        <span class="metric-value">${(metrics.test_r2 * 100).toFixed(2)}%</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Train RMSE</span>
                        <span class="metric-value">$${(metrics.train_rmse || 0).toLocaleString('en-US', {maximumFractionDigits: 0})}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Test RMSE</span>
                        <span class="metric-value">$${(metrics.test_rmse || 0).toLocaleString('en-US', {maximumFractionDigits: 0})}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Train MAE</span>
                        <span class="metric-value">$${(metrics.train_mae || 0).toLocaleString('en-US', {maximumFractionDigits: 0})}</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Test MAE</span>
                        <span class="metric-value">$${(metrics.test_mae || 0).toLocaleString('en-US', {maximumFractionDigits: 0})}</span>
                    </div>
                </div>

                <div class="card">
                    <h3>Top Feature Coefficients</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Feature Name</th>
                                <th>Coefficient Value</th>
                                <th>Direction and Impact</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${coeffArray.slice(0, 10).map(c => {
                                const coef = parseFloat(c.coefficient);
                                const isPositive = coef > 0;
                                const className = isPositive ? 'positive' : 'negative';
                                const direction = isPositive ? 'Increases' : 'Decreases';
                                return `
                                    <tr>
                                        <td><strong>${c.feature}</strong></td>
                                        <td class="${className}">$${coef.toLocaleString('en-US', {maximumFractionDigits: 2})}</td>
                                        <td class="${className}">${direction} by $${Math.abs(coef).toLocaleString('en-US', {maximumFractionDigits: 2})}</td>
                                    </tr>
                                `;
                            }).join('')}
                        </tbody>
                    </table>
                </div>

                <div class="prediction-card">
                    <h2>Predict House Price</h2>
                    <div class="form-grid" id="predictionForm"></div>
                    <button class="btn btn-primary" onclick="makePrediction(event)">Calculate Price</button>
                    <div class="prediction-result hidden" id="predictionResult">
                        <p>Estimated House Price:</p>
                        <div class="price" id="predictionPrice">--</div>
                        <p id="predictionConfidence" style="opacity: 0.8; margin-top: 10px;"></p>
                    </div>
                </div>

                <div class="section-title">
                    Comprehensive Visualizations and Analysis
                </div>
                <div class="section-divider"></div>

                ${images['model_evaluation.png'] ? `
                    <div class="image-container-full">
                        <h3>Model Evaluation Complete Analysis</h3>
                        <img src="data:image/png;base64,${images['model_evaluation.png']}" alt="Model Evaluation">
                    </div>
                ` : ''}

                ${images['rmse_analysis.png'] ? `
                    <div class="image-container-full">
                        <h3>RMSE Deep Dive Analysis</h3>
                        <img src="data:image/png;base64,${images['rmse_analysis.png']}" alt="RMSE Analysis">
                    </div>
                ` : ''}

                ${images['coefficients.png'] ? `
                    <div class="image-container-full">
                        <h3>Feature Impact on House Price</h3>
                        <img src="data:image/png;base64,${images['coefficients.png']}" alt="Coefficients">
                    </div>
                ` : ''}
            `;

            return html;
        }

        function attachEventListeners(features) {
            const form = document.getElementById('predictionForm');
            if (!form) return;

            // Only 8 essential features for prediction
            const essentialFeatures = [
                'GrLivArea',
                'OverallQual',
                'GarageCars',
                'TotRmsAbvGrd',
                'YearBuilt',
                'Total_Bath',
                'GarageArea',
                'Total_SF'
            ];

            const defaultValues = {
                'GrLivArea': 1500,
                'OverallQual': 7,
                'GarageCars': 2,
                'TotRmsAbvGrd': 6,
                'YearBuilt': 2000,
                'Total_Bath': 2,
                'GarageArea': 400,
                'Total_SF': 1500
            };

            const featuresToUse = essentialFeatures.filter(f => features.includes(f));

            featuresToUse.forEach(feature => {
                const value = defaultValues[feature] || 0;
                const label = feature
                    .replace(/_/g, ' ')
                    .replace(/([A-Z])/g, ' $1')
                    .trim();
                
                form.innerHTML += `
                    <div class="form-group">
                        <label>${label}</label>
                        <input type="number" id="input_${feature}" value="${value}" placeholder="Enter ${label}" step="0.01">
                    </div>
                `;
            });
        }

        async function makePrediction(event) {
            if (event) {
                event.preventDefault();
            }

            try {
                console.log('Making prediction...');
                const form = document.getElementById('predictionForm');
                
                if (!form) {
                    alert('Form not found');
                    return;
                }

                const inputs = form.querySelectorAll('input');
                const data = {};

                inputs.forEach(input => {
                    const feature = input.id.replace('input_', '');
                    const value = parseFloat(input.value);
                    if (!isNaN(value)) {
                        data[feature] = value;
                    }
                });

                console.log('Prediction data:', data);

                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error('HTTP error! status: ' + response.status);
                }

                const result = await response.json();
                console.log('Prediction result:', result);

                if (result.prediction !== undefined) {
                    document.getElementById('predictionPrice').textContent = result.formatted;
                    document.getElementById('predictionConfidence').textContent = 'Based on model with R² = ' + (Math.round(window.modelR2 * 10000) / 100) + '%';
                    document.getElementById('predictionResult').classList.remove('hidden');
                } else if (result.error) {
                    alert('Prediction error: ' + result.error);
                } else {
                    alert('Unexpected response format');
                }
            } catch (error) {
                console.error('Prediction error:', error);
                alert('Error making prediction: ' + error.message);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded');
            loadDashboard();
        });
    </script>
</body>
</html>
